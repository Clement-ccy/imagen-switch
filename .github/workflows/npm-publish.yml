name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is not published yet; publishing."
          fi

      - name: Publish package
        if: steps.npm-version.outputs.published == 'false'
        shell: bash
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Using NPM_AUTOMATION_TOKEN secret for npm publish."
          else
            unset NODE_AUTH_TOKEN
            echo "No NPM_AUTOMATION_TOKEN secret found; npm will use Trusted Publishing via GitHub OIDC."
          fi

          set +e
          npm publish --provenance --access public --ignore-scripts
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::error::npm publish failed. If the npm log says EOTP, replace any classic/granular publish token with an npm Automation token saved as NPM_AUTOMATION_TOKEN, or configure npm Trusted Publishing and leave that secret unset."
          fi
          exit "$status"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTOMATION_TOKEN }}
